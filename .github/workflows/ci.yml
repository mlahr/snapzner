name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race ./...
      - name: Build
        run: go build -o snapzner .

  release-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: check
